    function startTimer() {
        if (timerInterval) clearInterval(timerInterval); // Xóa timer cũ nếu có

            seconds++;
            const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
            const secs = String(seconds % 60).padStart(2, '0');
            document.getElementById('time').innerText = `${mins}:${secs}`;
        }, 1000);
    }

        if (flatQuestions.length === 0) {
            document.getElementById('question-container').innerText = "Đang tải dữ liệu hoặc dữ liệu trống...";
            return;
        }

        const isMainPhase = currentIndex < flatQuestions.length;
        const current = isMainPhase ? flatQuestions[currentIndex] : wrongQueue[0];

        if (!current) {
            finishQuiz();
            return;
        }

        // Cập nhật tiến độ
        const total = flatQuestions.length + (isMainPhase ? 0 : wrongQueue.length);
        document.getElementById('progress').innerText = `${currentIndex + 1}/${flatQuestions.length}`;

        // Hiển thị đoạn văn
        const passageBox = document.getElementById('passage-container');
        passageBox.innerHTML = current.passage;
        passageBox.classList.remove('hidden');

        // Hiển thị câu hỏi
        document.getElementById('question-container').innerText = current.q;

        // Hiển thị đáp án
        const optionsCont = document.getElementById('options-container');
        optionsCont.innerHTML = '';
        
        // Trộn đáp án để tăng độ khó
        const shuffled = [...current.options].sort(() => Math.random() - 0.5);
        
        shuffled.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => handleSelect(opt, btn, current);
            optionsCont.appendChild(btn);
        });
    }

    function handleSelect(choice, btn, data) {
        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.disabled = true);

        if (choice === data.ans) {
            btn.classList.add('correct');
            score += 10;
            document.getElementById('score').innerText = score;
            setTimeout(() => {
                if (currentIndex < flatQuestions.length) currentIndex++;
                else wrongQueue.shift();
                renderQuestion();
            }, 800);
        } else {
            btn.classList.add('wrong');
            // Hiển thị đáp án đúng
            Array.from(allBtns).find(b => b.innerText === data.ans).classList.add('correct');
            setTimeout(() => {
                let failed = (currentIndex < flatQuestions.length) ? flatQuestions[currentIndex] : wrongQueue.shift();
                if (currentIndex < flatQuestions.length) currentIndex++;
                wrongQueue.push(failed); // Lưu câu sai để làm lại cuối buổi
                renderQuestion();
            }, 2000);
        }
    }

    function finishQuiz() {
        clearInterval(timerInterval);
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-stats').innerText = `Hoàn thành với ${score} điểm!`;
    }

    // KHỞI CHẠY HỆ THỐNG
    window.onload = () => {
        prepareData();
        startTimer();
        renderQuestion();
    };
    </script>


</body>
